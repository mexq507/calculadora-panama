<!DOCTYPE html>
<html lang="es">
<head>
  <link rel="manifest" href="manifest.json">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora Panamá</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">

    <header>
      <h1>Calculadora Panamá</h1>
      <div class="tabs">
        <button class="tab active" onclick="showTab('itbms')">ITBMS</button>
        <button class="tab" onclick="showTab('prestamo')">Préstamo</button>
      </div>
    </header>

    <!-- MÓDULO ITBMS -->
    <div id="itbms" class="modulo">
      <div class="campo">
        <label>Tipo de impuesto</label>
        <select id="tasa">
          <option value="0.07">7% — General</option>
          <option value="0.10">10% — Alcohol</option>
          <option value="0.15">15% — Tabaco</option>
        </select>
      </div>
      <div class="campo">
        <label>Precio</label>
        <input type="number" id="precio" placeholder="0.00" />
      </div>
      <div class="campo">
        <label>¿Calcular?</label>
        <select id="modo">
          <option value="agregar">Agregar ITBMS al precio</option>
          <option value="extraer">Extraer ITBMS del total</option>
        </select>
      </div>
      <button class="btn" onclick="calcularITBMS()">Calcular</button>
      <div class="resultado" id="resultado-itbms"></div>
    </div>

    <!-- MÓDULO PRÉSTAMO -->
    <div id="prestamo" class="modulo oculto">
      <div class="campo">
        <label>Monto del préstamo ($)</label>
        <input type="number" id="monto" placeholder="0.00" />
      </div>
      <div class="campo">
        <label>Tasa de interés anual (%)</label>
        <input type="number" id="tasa-interes" placeholder="Ej: 12" />
      </div>
      <div class="campo">
        <label>Plazo (meses)</label>
        <input type="number" id="plazo" placeholder="Ej: 24" />
      </div>
      <button class="btn" onclick="calcularPrestamo()">Calcular</button>
      <div class="resultado" id="resultado-prestamo"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
